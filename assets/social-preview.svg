<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="quant-live-readiness-kit">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#162033"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4fd1c5"/>
      <stop offset="100%" stop-color="#7c83fd"/>
    </linearGradient>
    <style><![CDATA[
      .title   { font: 700 68px "Inter","Segoe UI","Helvetica Neue",Arial,sans-serif; fill: #ffffff; letter-spacing: -0.5px; }
      .tag     { font: 500 30px "Inter","Segoe UI","Helvetica Neue",Arial,sans-serif; fill: #c4cad8; }
      .kicker  { font: 600 22px "Inter","Segoe UI","Helvetica Neue",Arial,sans-serif; fill: #4fd1c5; letter-spacing: 3px; text-transform: uppercase; }
      .label   { font: 600 26px "Inter","Segoe UI","Helvetica Neue",Arial,sans-serif; fill: #ffffff; }
      .caption { font: 400 18px "Inter","Segoe UI","Helvetica Neue",Arial,sans-serif; fill: #9aa3b5; }
      .footer  { font: 500 20px "Inter","Segoe UI","Helvetica Neue",Arial,sans-serif; fill: #8893a8; letter-spacing: 1px; }
    ]]></style>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- accent bar -->
  <rect x="80" y="110" width="120" height="6" fill="url(#accent)"/>

  <!-- kicker -->
  <text x="80" y="96" class="kicker">research → paper → live</text>

  <!-- title -->
  <text x="80" y="192" class="title">quant-live-readiness-kit</text>

  <!-- tagline -->
  <text x="80" y="240" class="tag">Operational infrastructure for systematic trading strategies.</text>
  <text x="80" y="280" class="tag">Strategy-agnostic. Alpha-free. Python + CLI.</text>

  <!-- three feature boxes -->
  <g>
    <rect x="80"  y="360" width="360" height="160" rx="14" ry="14" fill="#1c2540" stroke="#2c3758" stroke-width="1"/>
    <rect x="460" y="360" width="360" height="160" rx="14" ry="14" fill="#1c2540" stroke="#2c3758" stroke-width="1"/>
    <rect x="840" y="360" width="360" height="160" rx="14" ry="14" fill="#1c2540" stroke="#2c3758" stroke-width="1"/>

    <!-- accent strips -->
    <rect x="80"  y="360" width="360" height="6" fill="#4fd1c5"/>
    <rect x="460" y="360" width="360" height="6" fill="#7c83fd"/>
    <rect x="840" y="360" width="360" height="6" fill="#f6ad55"/>

    <!-- box 1: freeze manifest -->
    <text x="104" y="414" class="label">Freeze manifest</text>
    <text x="104" y="450" class="caption">Hash config + flags + git</text>
    <text x="104" y="474" class="caption">state so drift is detectable</text>
    <text x="104" y="498" class="caption">every subsequent session.</text>

    <!-- box 2: reconciliation -->
    <text x="484" y="414" class="label">Reconciliation</text>
    <text x="484" y="450" class="caption">Classify every divergence</text>
    <text x="484" y="474" class="caption">between your model fills</text>
    <text x="484" y="498" class="caption">and your broker's fills.</text>

    <!-- box 3: promotion gate -->
    <text x="864" y="414" class="label">Promotion gate</text>
    <text x="864" y="450" class="caption">Score a YAML checklist</text>
    <text x="864" y="474" class="caption">before paper → limited-live</text>
    <text x="864" y="498" class="caption">→ full-live. No guesswork.</text>
  </g>

  <!-- footer -->
  <text x="80"   y="588" class="footer">github.com/cyangIIT/quant-live-readiness-kit</text>
  <text x="1200" y="588" class="footer" text-anchor="end">MIT · Python 3.10+</text>
</svg>
